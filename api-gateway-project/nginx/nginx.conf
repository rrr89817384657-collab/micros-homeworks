events {
    worker_connections 1024;
}

http {
    upstream security_service {
        server security:8080;
    }
    
    upstream uploader_service {
        server uploader:8081;
    }
    
    upstream minio_service {
        server minio:9000;
    }

    # Функция для проверки токена через сервис security
    server {
        listen 80;
        
        # Регистрация нового пользователя (анонимный доступ)
        location /v1/register {
            proxy_pass http://security_service/v1/user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Получение токена (анонимный доступ)
        location /v1/token {
            proxy_pass http://security_service/v1/token;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Получение информации о пользователе (требуется токен)
        location /v1/user {
            auth_request /v1/token/validation;
            auth_request_set $auth_status $upstream_status;
            
            proxy_pass http://security_service/v1/user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Загрузка файла (требуется токен)
        location /v1/upload {
            auth_request /v1/token/validation;
            auth_request_set $auth_status $upstream_status;
            
            client_max_body_size 100M;
            proxy_pass http://uploader_service/v1/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Получение изображения (требуется токен)
        location ~ ^/v1/user/(?<image>.+)$ {
            auth_request /v1/token/validation;
            auth_request_set $auth_status $upstream_status;
            
            proxy_pass http://minio_service/images/$image;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Внутренний endpoint для проверки токена
        location = /v1/token/validation {
            internal;
            
            proxy_pass http://security_service/v1/token/validation;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
        }

        # Error handling
        error_page 401 = @error401;
        location @error401 {
            return 401 '{"error": "Unauthorized"}';
            add_header Content-Type application/json;
        }

        error_page 403 = @error403;
        location @error403 {
            return 403 '{"error": "Forbidden"}';
            add_header Content-Type application/json;
        }
    }
}
